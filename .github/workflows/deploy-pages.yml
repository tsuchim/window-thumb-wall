name: Deploy Privacy Page

on:
  push:
    branches:
      - main
    paths:
      - 'PRIVACY.md'
      - 'PRIVACY.ja.md'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site directory
        run: |
          mkdir -p .pages-src
          mkdir -p .pages-src/_layouts

          cat > .pages-src/_config.yml <<'EOF'
          title: WindowThumbWall
          markdown: kramdown
          EOF

          cat > .pages-src/_layouts/default.html <<'EOF'
          <!DOCTYPE html>
          <html lang="{{ page.lang | default: 'en' }}">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{{ page.title | default: site.title }}</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                color: #333;
                max-width: 800px;
                margin: 0 auto;
                padding: 2rem;
              }
              h1, h2, h3 {
                border-bottom: 1px solid #eaecef;
                padding-bottom: .3em;
              }
              code {
                background-color: rgba(27,31,35,.05);
                border-radius: 3px;
                padding: .2em .4em;
              }
            </style>
          </head>
          <body>
            {{ content }}
          </body>
          </html>
          EOF

          {
            printf '%s\n' '---' \
              'layout: default' \
              'title: Privacy Policy' \
              'permalink: /PRIVACY.html' \
              '---'
            cat PRIVACY.md
          } > .pages-src/PRIVACY.md

          {
            printf '%s\n' '---' \
              'layout: default' \
              'title: プライバシーポリシー' \
              'permalink: /PRIVACY.ja.html' \
              'lang: ja' \
              '---'
            cat PRIVACY.ja.md
          } > .pages-src/PRIVACY.ja.md

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./.pages-src
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
