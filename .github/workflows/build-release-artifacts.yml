# Build release artifacts from signed tags.
# Signing will be added later via SignPath Foundation.

name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WindowThumbWall.csproj

      # ── Publish (self-contained, win-x64) ──────────────────────
      - name: Publish
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish

      # ── ZIP artifact ───────────────────────────────────────────
      - name: Remove PDB files
        run: Get-ChildItem publish -Filter *.pdb -Recurse | Remove-Item -Force

      - name: Create ZIP
        run: Compress-Archive -Path "publish\*" -DestinationPath "WindowThumbWall-win-x64.zip" -CompressionLevel Optimal

      # ── MSI artifact (WiX v5) ─────────────────────────────────
      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        run: |
          $wixVer = (wix --version) -replace '\+.*',''
          wix extension add -g "WixToolset.UI.wixext/$wixVer"

      - name: Publish for MSI
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish-msi

      - name: Build MSI
        run: |
          wix build packaging\WindowThumbWall.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d PublishDir="publish-msi" `
            -o WindowThumbWall-win-x64.msi

      # ── MSIX artifact ─────────────────────────────────────────
      - name: Publish for MSIX
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish-msix

      - name: Prepare MSIX layout
        run: |
          Copy-Item packaging\AppxManifest.xml publish-msix -Force
          Copy-Item packaging\Assets publish-msix\Assets -Recurse -Force

      - name: Create MSIX
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          & $makeappx pack /d publish-msix /p WindowThumbWall-win-x64.msix /o

      # ── Upload artifacts ───────────────────────────────────────
      # These unsigned artifacts will be signed via SignPath in a future step.
      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifacts
          path: |
            WindowThumbWall-win-x64.zip
            WindowThumbWall-win-x64.msi
            WindowThumbWall-win-x64.msix
          if-no-files-found: error
