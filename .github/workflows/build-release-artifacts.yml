# Build release artifacts from signed tags.
# Signing will be added later via SignPath Foundation.

name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      VERSION: ''
      DIST_DIR: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            $ver = $Matches[1]
          } else {
            $ver = 'dev'
          }
          "VERSION=$ver" | Out-File $env:GITHUB_ENV -Append
          Write-Host "VERSION=$ver"

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path $env:DIST_DIR | Out-Null

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WindowThumbWall.csproj

      # ── Publish (self-contained, win-x64) ──────────────────────
      - name: Publish
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish

      # ── ZIP artifact ───────────────────────────────────────────
      - name: Remove PDB files
        run: Get-ChildItem publish -Filter *.pdb -Recurse | Remove-Item -Force

      - name: Create ZIP
        run: Compress-Archive -Path "publish\*" -DestinationPath "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-x64.zip" -CompressionLevel Optimal

      # ── MSI artifact (WiX v5) ─────────────────────────────────
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix --version

      - name: Add WiX UI extension
        run: |
          $wixVer = (wix --version) -replace '\+.*',''
          wix extension add -g "WixToolset.UI.wixext/$wixVer"

      - name: Publish for MSI
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish-msi

      - name: Build MSI
        run: |
          wix build packaging\WindowThumbWall.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -d PublishDir="publish-msi" `
            -o "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-x64.msi"

      # ── MSIX artifact ─────────────────────────────────────────
      - name: Publish for MSIX
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish-msix

      - name: Prepare MSIX layout
        run: |
          Copy-Item packaging\AppxManifest.xml publish-msix -Force
          Copy-Item packaging\Assets publish-msix\Assets -Recurse -Force

      - name: Patch MSIX manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $plainVersion = $env:VERSION -replace '^v', ''
          if ($plainVersion -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "VERSION $($env:VERSION) does not match vX.Y.Z"
            exit 1
          }

          $versionParts = $plainVersion.Split('.')
          $packageVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2]).0"
          $manifestPath = 'publish-msix\AppxManifest.xml'

          [xml]$xml = Get-Content $manifestPath
          $xml.Package.Identity.Version = $packageVersion
          $xml.Save((Resolve-Path $manifestPath))

          Write-Host "Patched MSIX manifest version to $packageVersion"

      - name: Create MSIX
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) {
            Write-Error "makeappx.exe not found. Ensure Windows SDK is installed."
            exit 1
          }
          & $makeappx pack /d publish-msix /p "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-x64.msix" /o

      # ── Generate Metadata ─────────────────────────────────────
      - name: Generate release metadata
        run: |
          .\packaging\generate-release-metadata.ps1 -Version "$env:VERSION" -OutputDir "$env:DIST_DIR"

      # ── Upload artifacts ───────────────────────────────────────
      # These unsigned artifacts will be signed via SignPath in a future step.
      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifacts
          path: |
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-x64.zip
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-x64.msi
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-x64.msix
            ${{ env.DIST_DIR }}/release-notes.md
            ${{ env.DIST_DIR }}/store-listing-*.md
            ${{ env.DIST_DIR }}/store-whats-new-*.md
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      DIST_DIR: dist

    steps:
      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-artifacts
          path: ${{ env.DIST_DIR }}

      - name: Create draft GitHub Release and upload assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          name: WindowThumbWall ${{ env.GITHUB_REF_NAME }}
          body_path: ${{ env.DIST_DIR }}/release-notes.md
          draft: true
          files: |
            ${{ env.DIST_DIR }}/*.zip
            ${{ env.DIST_DIR }}/*.msi
            ${{ env.DIST_DIR }}/*.msix
          fail_on_unmatched_files: true
