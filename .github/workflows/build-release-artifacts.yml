# Build release artifacts from signed tags.
# Signing will be added later via SignPath Foundation.

name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      VERSION: ''
      DIST_DIR: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            $ver = $Matches[1]
          } else {
            $ver = 'dev'
          }
          "VERSION=$ver" | Out-File $env:GITHUB_ENV -Append
          Write-Host "VERSION=$ver"

      - name: Create output directory
        run: New-Item -ItemType Directory -Force -Path $env:DIST_DIR | Out-Null

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WindowThumbWall.csproj

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 7.0.0
          wix --version

      - name: Add WiX UI extension
        run: |
          wix extension add -acceptEula wix7 -g "WixToolset.UI.wixext/7.0.0"

      - name: Build architectures
        run: |
          $ErrorActionPreference = 'Stop'
          $architectures = @("x64", "arm64")
          foreach ($arch in $architectures) {
            $runtime = "win-$arch"
            Write-Host ">> Building for $runtime..." -ForegroundColor Cyan

            # ── Publish ──────────────────────────────────────────────
            dotnet publish WindowThumbWall.csproj `
              -c Release -r $runtime --self-contained `
              -p:PublishSingleFile=false `
              -o "publish-$arch"
            if ($LASTEXITCODE -ne 0) { throw "Application publish failed for $runtime" }

            # ── ZIP artifact ─────────────────────────────────────────
            Get-ChildItem "publish-$arch" -Filter *.pdb -Recurse | Remove-Item -Force
            $zipPath = "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-$arch.zip"
            Compress-Archive -Path "publish-$arch\*" -DestinationPath $zipPath -CompressionLevel Optimal
            if (-not (Test-Path -LiteralPath $zipPath) -or (Get-Item -LiteralPath $zipPath).Length -eq 0) {
              throw "ZIP creation failed for $runtime"
            }

            # ── MSI artifact (WiX v7) ────────────────────────────────
            # We need to publish again for MSI because it might need different settings or just a clean dir
            dotnet publish WindowThumbWall.csproj `
              -c Release -r $runtime --self-contained `
              -p:PublishSingleFile=false `
              -o "publish-msi-$arch"
            if ($LASTEXITCODE -ne 0) { throw "MSI publish failed for $runtime" }

            $publishMsiDir = (Resolve-Path "publish-msi-$arch").Path

            $plainVersion = $env:VERSION -replace '^v', ''
            if ($plainVersion -match '^\d+\.\d+\.\d+$') {
              $versionParts = $plainVersion.Split('.')
              $msiProductVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2]).0"
            } else {
              $msiProductVersion = (Select-Xml -Path WindowThumbWall.csproj -XPath '/Project/PropertyGroup/AssemblyVersion').Node.InnerText
            }

            $wixOutput = & wix build packaging\WindowThumbWall.wxs `
              -acceptEula wix7 `
              -arch $arch `
              -ext WixToolset.UI.wixext `
              -d PublishDir="$publishMsiDir" `
              -d ProductVersion="$msiProductVersion" `
              -o "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-$arch.msi" 2>&1
            $wixOutput | Write-Host
            if ($LASTEXITCODE -ne 0) { throw "WiX MSI build failed for $runtime" }
            if ($wixOutput -match 'WIX8600|WIX8601') { throw "WiX harvested no MSI payload files for $runtime" }
            & .\packaging\verify-msi-payload.ps1 -MsiPath "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-$arch.msi"

            # ── MSIX artifact ───────────────────────────────────────
            dotnet publish WindowThumbWall.csproj `
              -c Release -r $runtime --self-contained `
              -p:PublishSingleFile=false `
              -o "publish-msix-$arch"
            if ($LASTEXITCODE -ne 0) { throw "MSIX publish failed for $runtime" }

            Copy-Item packaging\AppxManifest.xml "publish-msix-$arch" -Force
            Copy-Item packaging\Assets "publish-msix-$arch\Assets" -Recurse -Force

            # Patch MSIX manifest version and architecture
            $plainVersion = $env:VERSION -replace '^v', ''
            $manifestPath = "publish-msix-$arch\AppxManifest.xml"
            [xml]$xml = Get-Content $manifestPath

            if ($plainVersion -match '^\d+\.\d+\.\d+$') {
              $versionParts = $plainVersion.Split('.')
              $packageVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2]).0"
              $xml.Package.Identity.Version = $packageVersion
              Write-Host "Patched MSIX manifest version to $packageVersion"
            }

            $xml.Package.Identity.ProcessorArchitecture = $arch
            $xml.Save((Resolve-Path $manifestPath))
            Write-Host "Patched MSIX manifest architecture to $arch"

            $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                        Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
            if (-not $makeappx) {
              Write-Error "makeappx.exe not found. Ensure Windows SDK is installed."
              exit 1
            }
            & $makeappx pack /d "publish-msix-$arch" /p "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-$arch.msix" /o
            if ($LASTEXITCODE -ne 0) { throw "makeappx failed for $runtime" }
            $msixPath = "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-$arch.msix"
            if (-not (Test-Path -LiteralPath $msixPath) -or (Get-Item -LiteralPath $msixPath).Length -eq 0) {
              throw "MSIX creation failed for $runtime"
            }
          }

      - name: Verify x64 MSI lifecycle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $msiPath = (Resolve-Path "$env:DIST_DIR\WindowThumbWall-$env:VERSION-win-x64.msi").Path
          $installLog = Join-Path $env:DIST_DIR 'msi-install.log'
          $uninstallLog = Join-Path $env:DIST_DIR 'msi-uninstall.log'
          $installedExe = 'C:\Program Files\WindowThumbWall\WindowThumbWall.exe'
          $installed = $false
          $plainVersion = $env:VERSION -replace '^v', ''
          if ($plainVersion -match '^\d+\.\d+\.\d+$') {
            $versionParts = $plainVersion.Split('.')
            $expectedFileVersion = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2]).0"
          } else {
            $expectedFileVersion = (Select-Xml -Path WindowThumbWall.csproj -XPath '/Project/PropertyGroup/AssemblyVersion').Node.InnerText
          }

          try {
            $installProcess = Start-Process -FilePath msiexec.exe -ArgumentList @('/i', $msiPath, '/qn', '/norestart', '/l*v', $installLog) -PassThru -Wait
            if ($installProcess.ExitCode -ne 0) { throw "MSI installation failed with exit code $($installProcess.ExitCode)" }
            $installed = $true

            if (-not (Test-Path -LiteralPath $installedExe)) { throw "Installed executable not found: $installedExe" }
            $installedVersion = (Get-Item -LiteralPath $installedExe).VersionInfo.FileVersion
            if ($installedVersion -ne $expectedFileVersion) { throw "Installed executable version was $installedVersion, expected $expectedFileVersion" }

            $app = Start-Process -FilePath $installedExe -PassThru
            Start-Sleep -Seconds 3
            $app.Refresh()
            if ($app.HasExited) { throw "Installed application exited during smoke test with code $($app.ExitCode)" }
            if ($app.CloseMainWindow()) {
              if (-not $app.WaitForExit(10000)) { throw 'Installed application did not exit after a clean close request' }
            } elseif (-not [Environment]::UserInteractive) {
              # GitHub-hosted runners have no interactive window station; clean up the proven smoke-test process.
              Stop-Process -Id $app.Id -Force -ErrorAction SilentlyContinue
              $app.WaitForExit()
            } else {
              throw 'Installed application did not accept a clean close request'
            }
          }
          finally {
            if ($installed) {
              $uninstallProcess = Start-Process -FilePath msiexec.exe -ArgumentList @('/x', $msiPath, '/qn', '/norestart', '/l*v', $uninstallLog) -PassThru -Wait
              if ($uninstallProcess.ExitCode -ne 0) { throw "MSI uninstall failed with exit code $($uninstallProcess.ExitCode)" }
              if (Test-Path -LiteralPath $installedExe) { throw "Installed executable remains after uninstall: $installedExe" }
            }
          }

      # ── Generate Metadata ─────────────────────────────────────
      - name: Generate release metadata
        run: |
          $ErrorActionPreference = 'Stop'
          .\packaging\generate-release-metadata.ps1 -Version "$env:VERSION" -OutputDir "$env:DIST_DIR"
          @('release-notes.md', 'store-listing-ja.md', 'store-listing-en.md', 'store-whats-new-ja.md', 'store-whats-new-en.md') | ForEach-Object {
            $metadataPath = Join-Path $env:DIST_DIR $_
            if (-not (Test-Path -LiteralPath $metadataPath) -or (Get-Item -LiteralPath $metadataPath).Length -eq 0) {
              throw "Expected release metadata was not generated: $_"
            }
          }

      - name: Upload MSI lifecycle logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msi-lifecycle-logs
          path: |
            ${{ env.DIST_DIR }}/msi-install.log
            ${{ env.DIST_DIR }}/msi-uninstall.log
          if-no-files-found: warn

      # ── Upload artifacts ───────────────────────────────────────
      # These unsigned artifacts will be signed via SignPath in a future step.
      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-artifacts
          path: |
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-*.zip
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-*.msi
            ${{ env.DIST_DIR }}/WindowThumbWall-${{ env.VERSION }}-win-*.msix
            ${{ env.DIST_DIR }}/release-notes.md
            ${{ env.DIST_DIR }}/store-listing-*.md
            ${{ env.DIST_DIR }}/store-whats-new-*.md
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      DIST_DIR: dist

    steps:
      - name: Download unsigned artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-artifacts
          path: ${{ env.DIST_DIR }}

      - name: Create draft GitHub Release and upload assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          name: WindowThumbWall ${{ env.GITHUB_REF_NAME }}
          body_path: ${{ env.DIST_DIR }}/release-notes.md
          draft: true
          files: |
            ${{ env.DIST_DIR }}/*.zip
            ${{ env.DIST_DIR }}/*.msi
            ${{ env.DIST_DIR }}/*.msix
          fail_on_unmatched_files: true
