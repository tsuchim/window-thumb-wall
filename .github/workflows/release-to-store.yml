# Publish to Microsoft Store via GitHub Actions

name: Release to Microsoft Store

on:
  push:
    tags:
      - 'v*' # GitHub Actions filters use glob patterns

jobs:
  publish:
    runs-on: windows-latest
    env:
      STORE_PRODUCT_ID: ${{ vars.MSSTORE_PRODUCT_ID }}
    
    steps:
      - name: Check prerequisites
        id: prereq
        shell: pwsh
        run: |
          $val = $env:STORE_PRODUCT_ID
          if (-not $val) {
            Write-Error "MSSTORE_PRODUCT_ID variable is missing from the repository variables."
            exit 1
          }
          $normalized = $val.ToUpperInvariant()
          if ($val -ne $normalized) {
            Write-Host "Normalizing STORE_PRODUCT_ID to uppercase: $normalized"
          }
          "store_product_id=$normalized" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract and validate version from tag
        id: versioning
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          if ($tag -notmatch '^v\d+\.\d+\.\d+(\.\d+)?$') {
            Write-Error "Tag $tag does not match format vX.Y.Z or vX.Y.Z.W"
            exit 1
          }
          $parts = $tag.Substring(1).Split('.')
          if ($parts.Length -eq 3) {
            $version = "$($parts[0]).$($parts[1]).$($parts[2]).0"
          } else {
            $version = $parts -join '.'
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Publishing version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore WindowThumbWall.csproj

      - name: Publish (Store version)
        run: |
          dotnet publish WindowThumbWall.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false `
            -o publish-msix

      - name: Patch AppxManifest version
        shell: pwsh
        run: |
          $manifestPath = "packaging\AppxManifest.xml"
          $targetPath = "publish-msix\AppxManifest.xml"
          $newVersion = "${{ steps.versioning.outputs.VERSION }}"
          $identityName = "tsuchim.WindowThumbWall"
          $identityPublisher = "CN=F6D2388F-2B1D-4A95-BC62-2D5CDADC605B"
          $publisherDisplayName = "tsuchim"

          $xml = New-Object System.Xml.XmlDocument
          $xml.PreserveWhitespace = $true
          $xml.Load($manifestPath)

          $namespaceUri = $xml.DocumentElement.NamespaceURI
          $namespaceManager = New-Object System.Xml.XmlNamespaceManager($xml.NameTable)
          $namespaceManager.AddNamespace("appx", $namespaceUri)

          $identityNode = $xml.SelectSingleNode("/appx:Package/appx:Identity", $namespaceManager)
          if (-not $identityNode) {
            throw "Identity element not found in $manifestPath"
          }

          $identityNode.SetAttribute("Name", $identityName)
          $identityNode.SetAttribute("Publisher", $identityPublisher)
          $identityNode.SetAttribute("Version", $newVersion)

          $publisherDisplayNameNode = $xml.SelectSingleNode("/appx:Package/appx:Properties/appx:PublisherDisplayName", $namespaceManager)
          if (-not $publisherDisplayNameNode) {
            throw "PublisherDisplayName element not found in $manifestPath"
          }

          $publisherDisplayNameNode.InnerText = $publisherDisplayName

          $settings = New-Object System.Xml.XmlWriterSettings
          $settings.Encoding = New-Object System.Text.UTF8Encoding($false)
          $settings.Indent = $true
          $settings.NewLineChars = "`n"
          $settings.NewLineHandling = [System.Xml.NewLineHandling]::Replace

          $writer = [System.Xml.XmlWriter]::Create($targetPath, $settings)
          try {
            $xml.Save($writer)
          } finally {
            $writer.Dispose()
          }

          Write-Host "Patched version to $newVersion in $targetPath"

      - name: Prepare Assets
        run: |
          Copy-Item packaging\Assets publish-msix\Assets -Recurse -Force

      - name: Create MSIX
        shell: pwsh
        run: |
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending | Select-Object -First 1 -ExpandProperty FullName
          if (-not $makeappx) {
            throw "makeappx.exe not found. Ensure Windows SDK is installed."
          }
          $msix = Join-Path "publish-msix" "WindowThumbWall-${{ steps.versioning.outputs.VERSION }}-win-x64.msix"
          & $makeappx pack /d "publish-msix" /p $msix /o
          Write-Host "MSIX created: $msix"

      - name: Setup Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2
        with:
          version: v0.3.9

      - name: MSStore Reconfigure
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId "${{ secrets.AZURE_AD_TENANT_ID }}" `
            --sellerId "${{ secrets.SELLER_ID }}" `
            --clientId "${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}" `
            --clientSecret "${{ secrets.AZURE_AD_APPLICATION_SECRET }}"

      - name: Store CLI Diagnostics
        shell: pwsh
        run: |
          msstore --version
          msstore publish --help

      - name: Direct DevCenter API Diagnostics
        shell: pwsh
        continue-on-error: true
        run: |
          $tenantId = "${{ secrets.AZURE_AD_TENANT_ID }}"
          $clientId = "${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}"
          $clientSecret = "${{ secrets.AZURE_AD_APPLICATION_SECRET }}"
          $productId = "${{ steps.prereq.outputs.store_product_id }}"

          $tokenUrl = "https://login.microsoftonline.com/$tenantId/oauth2/v2.0/token"
          $tokenBody = @{
              client_id     = $clientId
              client_secret = $clientSecret
              scope         = "https://manage.devcenter.microsoft.com/.default"
              grant_type    = "client_credentials"
          }

          Write-Host "Acquiring access token..."
          $tokenResponse = Invoke-WebRequest -Uri $tokenUrl -Method Post -Body $tokenBody -SkipHttpErrorCheck
          if ($tokenResponse.StatusCode -ne 200) {
              Write-Host "Token acquisition failed (HTTP $($tokenResponse.StatusCode))"
              $tokenResponse.Content | Out-String | Write-Host
              return
          }
          $token = ($tokenResponse.Content | ConvertFrom-Json).access_token
          Write-Host "Token acquisition success."

          $headers = @{
              Authorization = "Bearer $token"
              TenantId      = $tenantId
          }

          # 1) List applications
          Write-Host "`n--- List Applications ---"
          $listUrl = "https://manage.devcenter.microsoft.com/v1.0/my/applications?top=20&skip=0"
          $listResponse = Invoke-WebRequest -Uri $listUrl -Method Get -Headers $headers -SkipHttpErrorCheck
          Write-Host "List Applications status: $($listResponse.StatusCode)"
          
          if ($listResponse.StatusCode -eq 200) {
              $listData = $listResponse.Content | ConvertFrom-Json
              if ($listData.value) {
                  $listData.value | Select-Object id, primaryName, packageFamilyName | Format-Table -AutoSize | Out-String | Write-Host
              } else {
                  Write-Host "No 'value' array in JSON response."
              }
          } else {
              $listResponse.Content | Out-String | Write-Host
          }

          # 2) Get specific application
          Write-Host "`n--- Get Application ($productId) ---"
          $getUrl = "https://manage.devcenter.microsoft.com/v1.0/my/applications/$productId"
          $getResponse = Invoke-WebRequest -Uri $getUrl -Method Get -Headers $headers -SkipHttpErrorCheck
          Write-Host "Get Application status: $($getResponse.StatusCode)"

          if ($getResponse.StatusCode -eq 200) {
              $getData = $getResponse.Content | ConvertFrom-Json
              $getData | Select-Object id, primaryName, packageFamilyName | Format-List | Out-String | Write-Host
          } else {
              $content = $getResponse.Content | Out-String
              if ($content.Length -gt 1000) { $content = $content.Substring(0, 1000) + "..." }
              Write-Host $content
          }

      - name: MSStore Publish
        shell: pwsh
        run: |
          # Plan A only applies to already-live free Store products.
          # The first run stays as a draft submission for safety.
          $msix = Get-ChildItem (Join-Path $PWD "publish-msix") -Filter *.msix |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $msix) {
            throw "No .msix file found under publish-msix."
          }

          if (-not (Test-Path $msix.FullName)) {
            throw "MSIX file does not exist: $($msix.FullName)"
          }

          Write-Host "MSIX file: $($msix.FullName)"
          Get-Item $msix.FullName | Format-Table Name,Length,LastWriteTime -Auto

          msstore publish "$($msix.FullName)" -id "${{ steps.prereq.outputs.store_product_id }}" -nc -v

      - name: MSStore Status
        shell: pwsh
        run: |
          msstore submission status "${{ steps.prereq.outputs.store_product_id }}"
